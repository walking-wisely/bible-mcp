name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive_name: bible-mcp-x86_64-unknown-linux-musl.tar.gz
            binary_name: bible-mcp
          - os: macos-latest
            target: x86_64-apple-darwin
            archive_name: bible-mcp-x86_64-apple-darwin.tar.gz
            binary_name: bible-mcp
          - os: macos-latest
            target: aarch64-apple-darwin
            archive_name: bible-mcp-aarch64-apple-darwin.tar.gz
            binary_name: bible-mcp
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_name: bible-mcp-x86_64-pc-windows-msvc.zip
            binary_name: bible-mcp.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Install musl linker
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package Unix archive
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} dist/
          cp README.md LICENSE.md dist/
          tar -czf ${{ matrix.archive_name }} -C dist .

      - name: Package Windows archive
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" dist/
          Copy-Item README.md dist/
          Copy-Item LICENSE.md dist/
          Compress-Archive -Path dist\* -DestinationPath "${{ matrix.archive_name }}"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.archive_name }}
